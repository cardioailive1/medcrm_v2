# Render Blueprint — deploy with: New + > Blueprint, point at this repo.
databases:
  - name: medcrm-db
    databaseName: medcrm
    plan: free            # upgrade for production (free DBs expire after 90 days)
    postgresMajorVersion: "16"

services:
  - type: web
    name: medcrm-api
    runtime: node
    plan: free            # upgrade to starter+ for production
    region: oregon
    # Resilient: uses the lockfile when present (fast, reproducible), else falls back.
    # NODE_ENV=production would skip devDeps (nest CLI, typescript) → force them for the build.
    buildCommand: (npm ci --include=dev || npm install --include=dev) && npm run build && npx prisma migrate deploy
    startCommand: node dist/main.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: medcrm-db
          property: connectionString
      # Secrets are auto-generated on first deploy; rotate as needed.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: "900"
      - key: JWT_REFRESH_TTL
        value: "2592000"
      # Fill these in the Render dashboard (do NOT commit real keys).
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
